name: Run tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Github performs shallow clones by defaults - prevent that:
        fetch-depth: 0

    - uses: './.github/actions/setup'

    - name: Validate PR commits
      run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - uses: './.github/actions/setup'

    # silence a warning when running tests
    - name: Configure Git
      run: git config --global advice.defaultBranchName false

    - run: npm test
      env:
        CI: true

  build-vsix:
    name: build vsix (E2E tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: './.github/actions/setup'

      - name: Set PRERELEASE version
        run: |
          current_version=$(jq -r '.version' package.json)
          short_sha=$(git rev-parse --short HEAD)
          jq --arg new_version "${current_version}-PRERELEASE-${short_sha}" '.version = $new_version' package.json > tmp.json
          mv tmp.json package.json

      - name: Install vsce
        run: npm install --global @vscode/vsce

      - name: Package VSIX (win32-x64)
        run: node ./scripts/package-platform.js win32 x64
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.CODESCENE_IDE_DOCS_AND_WEBVIEW_TOKEN }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: e2e-vsix
          path: codescene-vscode-*-win32-x64.vsix

  e2e:
    name: E2E tests (windows-latest)
    runs-on: windows-latest
    needs: build-vsix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: e2e-vsix

      - name: Locate VSIX
        id: vsix
        run: |
          $f = Get-ChildItem -Path . -Filter 'codescene-vscode-*-win32-x64.vsix' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $f) { throw 'No VSIX found' }
          echo "path=$($f.FullName)" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install E2E environment
        run: pwsh -File ./install-e2e.ps1 -VsixPath '${{ steps.vsix.outputs.path }}'

      - name: Set extension VSIX path for E2E
        id: e2evsix
        run: |
          $f = Get-ChildItem -Path e2e\.vscode-test\extensions\*.vsix -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $f) { throw 'No VSIX in e2e\.vscode-test\extensions' }
          echo "path=$($f.FullName)" >> $env:GITHUB_OUTPUT

      - name: Restore E2E project
        run: dotnet restore e2e/csharp.csproj

      - name: Build E2E project
        run: dotnet build e2e/csharp.csproj -c Release --no-restore

      - name: Install Playwright browsers
        run: pwsh -File e2e/bin/Release/net10.0/playwright.ps1 install
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.playwright

      - name: Run E2E tests
        run: dotnet test e2e/csharp.csproj -c Release --no-build --logger "trx;LogFileName=e2e-results.trx" --results-directory TestResults
        env:
          VSCODE_TEST_EXTENSION_VSIX_PATH: ${{ steps.e2evsix.outputs.path }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E test results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false
